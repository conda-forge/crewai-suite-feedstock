# yaml-language-server: $schema=https://raw.githubusercontent.com/prefix-dev/recipe-format/main/schema.json
schema_version: 1

context:
  version: "1.15.3"
  python_min: "3.10"

recipe:
  name: crewai-suite
  version: ${{ version }}

build:
  number: 0

outputs:
  - package:
      name: crewai-core
      version: ${{ version }}
    source:
      - url: https://pypi.org/packages/source/c/crewai_core/crewai_core-${{ version }}.tar.gz
        sha256: bed5421e26969ac60af885ff00c249ab0c21740022a4da763f3f4a8b4f2d6036
    build:
      noarch: python
      script: |
        pip install . -vv --no-deps --no-build-isolation
    requirements:
      host:
        - python ${{ python_min }}.*
        - hatchling
        - pip
      run:
        - python >=${{ python_min }},<3.14
        - appdirs >=1.4.4,<1.5.0
        - cryptography >=42.0
        - httpx >=0.28.1,<0.29.0
        - packaging >=23.0
        - portalocker >=2.7.0,<2.8.0
        - pyjwt >=2.13.0,<3
        - pydantic >=2.11.9,<2.13.0
        - rich >=13.7.1
        - opentelemetry-api >=1.34.0,<1.35.0
        - opentelemetry-sdk >=1.34.0,<1.35.0
        - opentelemetry-exporter-otlp-proto-http >=1.34.0,<1.35.0
        - tomli >=2.0.2,<2.1.0
    tests:
      - python:
          imports:
            - crewai_core
          pip_check: false
          python_version: ${{ python_min }}.*
    about:
      summary: Shared utilities for CrewAI — version, paths, user-data, telemetry, printer."
      license: MIT
      license_file: LICENSE
      homepage: https://github.com/crewAIInc/crewAI

  - package:
      name: crewai-cli
      version: ${{ version }}
    source:
      - url: https://pypi.org/packages/source/c/crewai_cli/crewai_cli-${{ version }}.tar.gz
        sha256: 65e3dc19caf3a868f7982f10a78046fb0159ebe8f5bf003e1aefafa1b3c43e2c
    build:
      noarch: python
      python:
        entry_points:
          - crewai = crewai_cli.cli:crewai
      script: |
        pip install . -vv --no-deps --no-build-isolation
    requirements:
      host:
        - python ${{ python_min }}.*
        - hatchling
        - pip
      run:
        - python >=${{ python_min }},<3.14
        - ${{ pin_subpackage('crewai-core', exact=True) }}
        - click >=8.1.7,<9
        - pydantic >=2.11.9,<2.13.0
        - pydantic-settings >=2.10.1,<2.11.0
        - appdirs >=1.4.4,<1.5.0
        - cryptography >=42.0
        - httpx >=0.28.1,<0.29.0
        - pyjwt >=2.13.0,<3
        - rich >=13.7.1
        - tomli >=2.0.2,<2.1.0
        - tomli-w >=1.1.0,<1.2.0
        - packaging >=23.0
        - python-dotenv >=1.2.2,<2
        - uv >=0.11.6,<0.12.0
        - textual>=7.5.0
        - certifi
    tests:
      - python:
          imports:
            - crewai_cli
          pip_check: false
          python_version: ${{ python_min }}.*
      - script:
          - crewai --help
        requirements:
          run:
            - python ${{ python_min }}.*
    about:
      summary: CLI for CrewAI — scaffold, run, deploy and manage AI agent crews.
      license: MIT
      license_file: LICENSE
      homepage: https://github.com/crewAIInc/crewAI

  - package:
      name: crewai
      version: ${{ version }}
    source:
      - url: https://pypi.org/packages/source/c/crewai/crewai-${{ version }}.tar.gz
        sha256: e417924c6ccc400b97ce38bf31b00ec1ba47d7580ed482118991f6f671cd0ad4
    build:
      noarch: python
      python:
        entry_points:
          - crewai = crewai_cli.cli:crewai
      script: |
        python -m pip install . -vv --no-deps --no-build-isolation
    requirements:
      host:
        - python ${{ python_min }}.*
        - hatchling
        - pip
      run:
        - python >=${{ python_min }},<3.14
        - ${{ pin_subpackage('crewai-core', exact=True) }}
        - ${{ pin_subpackage('crewai-cli', exact=True) }}
        - pydantic >=2.11.9,<2.13
        - openai >=2.30.0,<3
        - instructor >=1.3.3
        - pdfplumber >=0.11.4,<0.12.0
        - regex >=2026.1.15,<2026.2.0
        - opentelemetry-api >=1.34.0,<1.35.0
        - opentelemetry-sdk >=1.34.0,<1.35.0
        - opentelemetry-exporter-otlp-proto-http >=1.34.0,<1.35.0
        - chromadb >=1.1.0,<1.2.0
        - tokenizers >=0.21,<1
        - openpyxl >=3.1.5,<3.2.0
        - python-dotenv >=1.2.2,<2
        - pyjwt >=2.13.0,<3
        - click >=8.1.7,<8.2.0
        - appdirs >=1.4.4,<1.5.0
        - jsonref >=1.1.0,<1.2.0
        - json-repair >=0.25.2,<0.26.0
        - tomli-w >=1.1.0,<1.2.0
        - tomli >=2.0.2,<2.1.0
        - json5 >=0.10.0,<0.11.0
        - portalocker >=2.7.0,<2.8.0
        - pydantic-settings >=2.10.1,<2.11.0
        - httpx >=0.28.1,<0.29.0
        - mcp >=1.26.0,<1.27.0
        - aiosqlite >=0.21.0,<0.22.0
        - pyyaml >=6.0,<7.0
        - aiofiles >=24.1.0,<24.2.0
        - lancedb >=0.29.2,<0.30.1
    tests:
      - python:
          imports:
            - crewai
          pip_check: false
          python_version: ${{ python_min }}.*
      - script:
          - crewai --help
        requirements:
          run:
            - python ${{ python_min }}.*
    about:
      summary: Cutting-edge framework for orchestrating role-playing, autonomous AI agents. By fostering collaborative intelligence, CrewAI empowers agents to work together seamlessly, tackling complex tasks.
      license: MIT
      license_file: LICENSE
      homepage: https://github.com/crewAIInc/crewAI

  - package:
      name: crewai-tools
      version: ${{ version }}
    source:
      - url: https://pypi.org/packages/source/c/crewai_tools/crewai_tools-${{ version }}.tar.gz
        sha256: 85c5874b5146a7af5353aaec029a90420c431e12bdc65260e3c100f7dbd3868e
    build:
      noarch: python
      script: |
        pip install . -vv --no-deps --no-build-isolation
    requirements:
      host:
        - python ${{ python_min }}.*
        - hatchling
        - pip
      run:
        - python >=${{ python_min }},<3.14
        - ${{ pin_subpackage('crewai', exact=True) }}
        - pytube >=15.0.0,<15.1.0
        - requests >=2.33.0,<3
        - tiktoken >=0.8.0,<0.13
        - beautifulsoup4 >=4.13.4,<4.14.0
        - python-docx >=1.2.0,<1.3.0
        - youtube-transcript-api >=1.2.2,<1.3.0
        - pymupdf >=1.26.6,<1.27.0
    tests:
      - python:
          imports:
            - crewai_tools
          pip_check: false
          python_version: ${{ python_min }}.*
    about:
      summary: Set of tools for the crewAI framework
      license: MIT
      license_file: LICENSE
      homepage: https://github.com/crewAIInc/crewAI

  - package:
      name: crewai-files
      version: ${{ version }}
    source:
      - url: https://pypi.org/packages/source/c/crewai-files/crewai_files-${{ version }}.tar.gz
        sha256: ec4c5fd7d660ad141ce6d590e7712d7c4bfd8e87ed2e9ba22d1c4b24af61176a
    build:
      noarch: python
      script: |
        pip install . -vv --no-deps --no-build-isolation
    requirements:
      host:
        - python ${{ python_min }}.*
        - hatchling
        - pip
      run:
        - python >=${{ python_min }},<3.14
        - pydantic >=2.11.9,<2.13.0
        - pillow >=12.1.1,<12.2.0
        - pypdf >=6.10.0,<6.11.0
        - python-magic >=0.4.27
        - aiocache >=0.12.3,<0.13.0
        - aiofiles >=24.1.0,<24.2.0
        - tinytag >=2.2.1,<2.3.0
        - av >=13.0.0,<13.1.0
    tests:
      - python:
          imports:
            - crewai_files
          pip_check: false
          python_version: ${{ python_min }}.*
    about:
      summary: File handling utilities for CrewAI multimodal inputs
      license: MIT
      license_file: LICENSE
      homepage: https://github.com/crewAIInc/crewAI

about:
  summary: CrewAI framework and tools for orchestrating autonomous AI agents
  license: MIT
  license_file: LICENSE
  homepage: https://github.com/crewAIInc/crewAI

extra:
  recipe-maintainers:
    - soapy1
